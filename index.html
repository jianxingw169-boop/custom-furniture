<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>全屋定制助手</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2d1810">
<meta name="apple-mobile-web-app-title" content="定制助手">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400;1,6..72,500&family=DM+Sans:opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --clay:#c47040;--clay-light:#e8c4a8;--clay-glint:#fcefe6;
  --brown:#2d1810;--brown-mid:#5a3d30;--wood:#8b7355;
  --cream:#faf5f0;--cream-dark:#ede0d6;--cream-deep:#e0d0c2;
  --card:#ffffff;--card-border:#f0e6de;
  --text:#2d1810;--text-secondary:#6b5a4e;--text-muted:#a89888;
  --gold:#d4a030;--green:#5a8f6a;--green-light:#eaf5ee;
  --red:#d4604a;--red-light:#fceeea;
  --shadow-sm:0 1px 3px rgba(45,24,16,0.06);
  --shadow-md:0 4px 12px rgba(45,24,16,0.08);
  --shadow-lg:0 8px 32px rgba(45,24,16,0.12);
  --radius:14px;--radius-sm:10px;--radius-xs:6px;
  --font-display:'Newsreader',Georgia,serif;--font-body:'DM Sans','PingFang SC','Microsoft YaHei','Hiragino Sans GB',sans-serif;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
  --tab-h:56px;--header-h:56px;
}
html,body{height:100%;overflow:hidden}
body{
  font-family:var(--font-body);background:var(--cream);color:var(--text);
  -webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;
  display:flex;flex-direction:column;
}
::selection{background:var(--clay-light);color:var(--brown)}

/* ── Header ── */
.header{
  height:var(--header-h);background:var(--brown);padding:0 16px;
  display:flex;align-items:center;justify-content:space-between;
  position:relative;z-index:10;flex-shrink:0;
}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--clay),var(--clay-light),var(--clay));}
.header-left{display:flex;align-items:center;gap:10px;min-width:0;flex:1;}
.header-icon{font-size:22px;flex-shrink:0;}
.header-title{font-family:var(--font-display);font-size:18px;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.header-right{display:flex;align-items:center;gap:4px;}
.header-btn{width:36px;height:36px;border:none;border-radius:8px;background:transparent;color:var(--cream);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.header-btn:hover{background:rgba(255,255,255,0.1);}

/* ── Search bar (inside header, shown only for dimensions) ── */
.search-row{display:none;padding:0 16px 10px;background:var(--brown);}
.search-row.show{display:block;}
.search-wrap{position:relative;}
.search-wrap input{
  width:100%;height:38px;padding:0 34px 0 12px;border:none;border-radius:var(--radius-sm);
  background:rgba(255,255,255,0.12);color:var(--cream);font-size:14px;font-family:var(--font-body);
  outline:none;transition:background .2s;
}
.search-wrap input::placeholder{color:rgba(255,255,255,0.4)}
.search-wrap input:focus{background:rgba(255,255,255,0.2)}
.search-wrap .search-icon{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:16px;opacity:0.4;pointer-events:none;}

/* ── Page container ── */
.page{display:none;flex-direction:column;flex:1;overflow:hidden;}
.page.active{display:flex;}
.page-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 12px 20px;}

/* ── Tab bar (bottom) ── */
.tab-bar{
  display:flex;background:var(--card);border-top:1px solid var(--card-border);
  padding-bottom:var(--safe-bottom);flex-shrink:0;z-index:20;
  box-shadow:0 -2px 12px rgba(45,24,16,0.06);
}
.tab-item{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;
  padding:6px 0 4px;font-size:10px;font-weight:500;font-family:var(--font-body);
  color:var(--text-muted);cursor:pointer;border:none;background:transparent;
  transition:color .2s;position:relative;user-select:none;
}
.tab-item .tab-icon{font-size:22px;line-height:1.2;}
.tab-item.active{color:var(--clay);}
.tab-item.active::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:20px;height:2px;border-radius:0 0 2px 2px;background:var(--clay);}

/* ── Sub tabs ── */
.sub-tabs{display:flex;gap:6px;padding:12px 0 8px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.sub-tabs::-webkit-scrollbar{display:none}
.sub-tab{
  flex-shrink:0;padding:6px 14px;border:none;border-radius:8px;
  font-size:13px;font-weight:500;font-family:var(--font-body);cursor:pointer;
  background:var(--cream-dark);color:var(--text-secondary);transition:all .2s;white-space:nowrap;
}
.sub-tab.active{background:var(--clay);color:var(--card);}
.sub-tab:hover{background:var(--cream-deep);}
.sub-tab.active:hover{background:var(--clay);}

/* ── Cards grid ── */
.cards-grid{display:flex;flex-direction:column;gap:10px;padding-top:8px;}
@media(min-width:520px){.cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}}
@media(min-width:900px){.cards-grid{grid-template-columns:1fr 1fr 1fr;gap:14px;}}
@media(min-width:1200px){.cards-grid{grid-template-columns:1fr 1fr 1fr 1fr;}}

.card{
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow-sm);
  overflow:hidden;cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1);position:relative;
  animation:fadeUp .35s ease-out both;
}
.card:active{transform:scale(.97)}
.card:hover{box-shadow:var(--shadow-md)}
.card-inner{padding:12px 14px;display:flex;align-items:center;gap:10px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card-ruler{width:4px;align-self:stretch;border-radius:2px;flex-shrink:0;background:var(--cream-deep);}
.card-ruler.fav{background:linear-gradient(180deg,var(--clay),var(--clay-light));}
.card-body{flex:1;min-width:0;}
.card-name{font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px;margin-bottom:1px;}
.card-dim{font-family:var(--font-display);font-size:20px;font-weight:500;color:var(--clay);letter-spacing:-.3px;}
.card-dim .unit{font-family:var(--font-body);font-size:11px;font-weight:500;color:var(--text-muted);margin-left:2px}
.card-note{font-size:11px;color:var(--text-secondary);margin-top:1px;line-height:1.3;}
.card-star{font-size:20px;cursor:pointer;flex-shrink:0;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:8px;transition:all .2s;user-select:none;color:var(--text-muted);border:none;background:none;}
.card-star:hover{background:var(--cream-dark)}
.card-star.active{color:var(--gold)}
.card-badge{display:inline-flex;font-size:9px;font-weight:600;padding:0 6px;border-radius:4px;background:var(--cream-dark);color:var(--text-secondary);}
.dim-bar{margin-top:5px;height:3px;border-radius:2px;background:var(--cream-dark);position:relative;overflow:hidden;max-width:160px;}
.dim-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--clay),var(--clay-light));transition:width .4s ease-out;}

/* ── Bottom sheet modal ── */
.modal-overlay{
  position:fixed;inset:0;z-index:100;background:rgba(45,24,16,0.4);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal-sheet{
  background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:520px;
  max-height:70vh;overflow-y:auto;padding:20px 20px calc(20px+var(--safe-bottom));
  transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);
  box-shadow:0 -8px 40px rgba(45,24,16,0.15);
}
.modal-overlay.show .modal-sheet{transform:translateY(0)}
.modal-handle{width:36px;height:4px;border-radius:2px;background:var(--cream-dark);margin:-8px auto 12px;}
.modal-title{font-family:var(--font-display);font-size:20px;color:var(--brown);}
.modal-cat{font-size:12px;color:var(--text-muted);margin-bottom:2px;}
.modal-dim{font-family:var(--font-display);font-size:32px;color:var(--clay);margin:6px 0 2px;}
.modal-dim .unit{font-family:var(--font-body);font-size:13px;color:var(--text-muted);}
.modal-dim-bar{height:8px;border-radius:4px;background:var(--cream-dark);margin:6px 0 12px;overflow:hidden;}
.modal-dim-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--clay),var(--clay-light));}
.modal-section{padding:12px 0;border-top:1px solid var(--cream-dark);}
.modal-section h4{font-size:12px;font-weight:600;color:var(--brown);margin-bottom:6px;}
.modal-section p,.modal-section li{font-size:13px;color:var(--text-secondary);line-height:1.6;}
.modal-section ul{padding-left:16px;}

/* ── Toast ── */
.toast{
  position:fixed;bottom:calc(var(--tab-h) + 16px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--brown);color:var(--cream);padding:10px 20px;border-radius:10px;
  font-size:13px;font-weight:500;box-shadow:var(--shadow-lg);z-index:200;
  opacity:0;pointer-events:none;transition:all .3s;white-space:nowrap;max-width:90vw;text-overflow:ellipsis;overflow:hidden;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-8px)}

/* ── Page transition ── */
.page-enter{animation:pageFadeIn .25s ease-out}
@keyframes pageFadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ── Empty state ── */
.empty-state{text-align:center;padding:50px 20px 30px;}
.empty-state .emoji{font-size:44px;margin-bottom:10px;display:block;opacity:.6;}
.empty-state h3{font-size:16px;font-weight:600;color:var(--text-secondary);margin-bottom:3px;}
.empty-state p{font-size:13px;color:var(--text-muted);}

/* ── Forms ── */
.form-group{margin-bottom:14px;}
.form-label{font-size:12px;font-weight:600;color:var(--brown);margin-bottom:4px;display:block;}
.form-input,.form-select{
  width:100%;height:42px;padding:0 12px;border:1.5px solid var(--card-border);
  border-radius:var(--radius-sm);background:var(--card);font-size:14px;
  font-family:var(--font-body);color:var(--text);outline:none;transition:border-color .2s;
}
.form-input:focus,.form-select:focus{border-color:var(--clay);box-shadow:0 0 0 3px var(--clay-glint);}
.form-textarea{width:100%;padding:10px 12px;border:1.5px solid var(--card-border);border-radius:var(--radius-sm);background:var(--card);font-size:14px;font-family:var(--font-body);color:var(--text);outline:none;resize:vertical;min-height:70px;transition:border-color .2s;}
.form-textarea:focus{border-color:var(--clay);box-shadow:0 0 0 3px var(--clay-glint);}
.form-row{display:flex;gap:8px;}
.form-row .form-group{flex:1;}
.form-hint{font-size:11px;color:var(--text-muted);margin-top:2px;}
.form-actions{display:flex;gap:8px;margin-top:16px;}
.form-actions .btn{flex:1;}

/* ── Buttons ── */
.btn{height:44px;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;font-family:var(--font-body);cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:0 16px;user-select:none;}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--clay);color:var(--card);}
.btn-primary:hover{background:#b06035;}
.btn-secondary{background:var(--cream-dark);color:var(--text-secondary);}
.btn-secondary:hover{background:var(--cream-deep);}
.btn-outline{background:transparent;color:var(--clay);border:1.5px solid var(--clay);}
.btn-sm{height:34px;font-size:12px;padding:0 12px;}
.btn-icon{width:42px;padding:0;}
.btn-danger{background:var(--red);color:var(--card);}
.btn-danger:hover{background:#c0503a;}
.btn-block{width:100%;}
.btn-round{border-radius:20px;}
.btn-lg{height:48px;font-size:16px;}

/* ── FAB ── */
.fab{
  position:fixed;bottom:calc(var(--tab-h) + 20px + var(--safe-bottom));right:20px;
  width:52px;height:52px;border-radius:50%;border:none;
  background:var(--clay);color:var(--card);font-size:28px;line-height:1;
  box-shadow:0 4px 16px rgba(196,112,64,0.35);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;z-index:15;user-select:none;
}
.fab:active{transform:scale(.9);}

/* ── Module: 量尺记录 ── */
.rec-card{
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow-sm);
  padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:all .2s;
}
.rec-card:active{transform:scale(.98);}
.rec-card-header{display:flex;justify-content:space-between;align-items:start;margin-bottom:6px;}
.rec-card-name{font-size:15px;font-weight:600;}
.rec-card-date{font-size:11px;color:var(--text-muted);}
.rec-card-rooms{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px;}
.rec-room-tag{font-size:11px;padding:1px 8px;border-radius:4px;background:var(--clay-glint);color:var(--clay);}
.rec-card-del{color:var(--red);border:none;background:none;font-size:16px;cursor:pointer;padding:2px;line-height:1;}

/* Measure form */
.room-entry{background:var(--cream);border-radius:var(--radius-sm);padding:12px;margin-bottom:12px;}
.room-entry-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.room-entry-title{font-size:13px;font-weight:600;}
.room-entry .form-row{gap:6px;}
.room-entry .form-group{margin-bottom:6px;}
.add-room-btn{width:100%;height:38px;border:1.5px dashed var(--cream-deep);border-radius:var(--radius-sm);background:transparent;font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;transition:all .2s;font-family:var(--font-body);margin-bottom:12px;}
.add-room-btn:hover{border-color:var(--clay-light);color:var(--clay);}
.sub-door-entry{padding:8px;background:var(--card);border-radius:var(--radius-xs);margin-bottom:6px;border:1px solid var(--card-border);}
.sub-door-entry .form-row{gap:4px;}
.sub-door-entry .form-group{margin-bottom:0;}
.sub-door-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.sub-door-header span{font-size:11px;color:var(--text-muted);}
.sub-door-header button{font-size:14px;color:var(--red);border:none;background:none;cursor:pointer;}

/* Recommendations */
.rec-results{margin:12px 0;padding:12px;background:var(--green-light);border-radius:var(--radius-sm);}
.rec-results h4{font-size:12px;font-weight:600;color:var(--green);margin-bottom:6px;}
.rec-item{font-size:13px;color:var(--text-secondary);padding:2px 0;display:flex;gap:6px;}
.rec-item .dot{color:var(--green);}

/* ── Module: 报价速算 ── */
.quote-type-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.quote-type-btn{
  padding:14px 10px;border:2px solid var(--cream-dark);border-radius:var(--radius-sm);
  background:var(--card);cursor:pointer;text-align:center;transition:all .2s;font-family:var(--font-body);
}
.quote-type-btn .qt-icon{font-size:24px;display:block;margin-bottom:3px;}
.quote-type-btn .qt-label{font-size:13px;font-weight:500;color:var(--text);}
.quote-type-btn.active{border-color:var(--clay);background:var(--clay-glint);}
.quote-type-btn:active{transform:scale(.96);}

.grade-chips{display:flex;gap:8px;}
.grade-chip{
  flex:1;padding:12px 8px;border:2px solid var(--cream-dark);border-radius:var(--radius-sm);
  text-align:center;cursor:pointer;transition:all .2s;font-family:var(--font-body);background:var(--card);
}
.grade-chip .grade-name{font-size:14px;font-weight:600;color:var(--text);display:block;}
.grade-chip .grade-price{font-size:11px;color:var(--text-muted);display:block;margin-top:2px;}
.grade-chip.active{border-color:var(--clay);background:var(--clay-glint);}

.option-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--cream-dark);}
.option-row:last-child{border:none;}
.option-row label{font-size:13px;display:flex;align-items:center;gap:8px;cursor:pointer;}
.option-row input[type=checkbox]{width:18px;height:18px;accent-color:var(--clay);cursor:pointer;}
.option-row .opt-price{font-size:12px;color:var(--text-muted);}

.quote-result{background:var(--cream);border-radius:var(--radius);padding:16px;margin-top:12px;}
.quote-result-title{font-size:14px;font-weight:600;margin-bottom:8px;color:var(--brown);}
.quote-breakdown-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:13px;}
.quote-breakdown-row .bd-label{width:50px;color:var(--text-secondary);flex-shrink:0;}
.quote-breakdown-row .bd-bar{flex:1;height:6px;border-radius:3px;background:var(--cream-deep);overflow:hidden;}
.quote-breakdown-row .bd-bar-fill{height:100%;border-radius:3px;background:var(--clay);transition:width .5s;}
.quote-breakdown-row .bd-val{width:44px;text-align:right;font-weight:500;color:var(--text);flex-shrink:0;}
.quote-total{text-align:right;padding-top:8px;margin-top:8px;border-top:2px solid var(--card-border);}
.quote-total .total-label{font-size:12px;color:var(--text-muted);}
.quote-total .total-number{font-family:var(--font-display);font-size:28px;color:var(--clay);font-weight:500;}
.quote-total .total-number .unit{font-family:var(--font-body);font-size:14px;color:var(--text-muted);margin-left:2px;}
.quote-meta{font-size:11px;color:var(--text-muted);margin-top:4px;}

/* ── Module: 设计流程 ── */
.workflow-progress{margin:12px 0;padding:16px;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow-sm);}
.wf-progress-bar{height:6px;border-radius:3px;background:var(--cream-dark);overflow:hidden;margin-bottom:8px;}
.wf-progress-fill{height:100%;border-radius:3px;background:var(--clay);transition:width .5s;}
.wf-progress-text{font-size:12px;color:var(--text-muted);text-align:center;}
.wf-steps{display:flex;justify-content:space-between;margin:16px 0;padding:0 4px;position:relative;}
.wf-step{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;position:relative;z-index:1;background:var(--cream);padding:0 2px;}
.wf-step-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;border:2px solid var(--cream-deep);background:var(--card);transition:all .3s;}
.wf-step.done .wf-step-dot{background:var(--green);border-color:var(--green);color:var(--card);}
.wf-step.current .wf-step-dot{background:var(--clay);border-color:var(--clay);color:var(--card);box-shadow:0 2px 8px rgba(196,112,64,0.3);}
.wf-step-label{font-size:10px;color:var(--text-muted);white-space:nowrap;}
.wf-step.done .wf-step-label,.wf-step.current .wf-step-label{color:var(--text);font-weight:600;}
.wf-steps-line{position:absolute;top:16px;left:10%;right:10%;height:2px;background:var(--cream-deep);z-index:0;}
.wf-steps-line-fill{height:100%;background:var(--green);transition:width .5s;}

.wf-step-content{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow-sm);padding:16px;margin:12px 0;}
.wf-step-title{font-size:16px;font-weight:600;margin-bottom:8px;color:var(--brown);}

.checklist-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--cream-dark);cursor:pointer;}
.checklist-item:last-child{border:none;}
.checklist-item .ck-box{width:22px;height:22px;border:2px solid var(--cream-deep);border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .2s;margin-top:1px;}
.checklist-item.done .ck-box{background:var(--green);border-color:var(--green);color:var(--card);}
.checklist-item .ck-text{font-size:13px;color:var(--text);line-height:1.4;flex:1;}
.checklist-item.done .ck-text{color:var(--text-muted);text-decoration:line-through;}

.collapse-toggle{padding:10px 0;display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-size:13px;font-weight:600;border-bottom:1px solid var(--cream-dark);}
.collapse-toggle:last-child{border-bottom:none;}
.collapse-toggle .arrow{transition:transform .2s;font-size:12px;}
.collapse-toggle.open .arrow{transform:rotate(180deg);}
.collapse-body{display:none;padding:10px 0;font-size:13px;color:var(--text-secondary);line-height:1.6;}
.collapse-body.open{display:block;}
.collapse-body ul{padding-left:16px;}
.collapse-body li{margin-bottom:4px;}
.wf-step-footer{margin-top:12px;}

/* ── Module: 材料五金 ── */
.mat-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow-sm);padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:all .2s;}
.mat-card:active{transform:scale(.98);}
.mat-card-header{display:flex;justify-content:space-between;align-items:start;margin-bottom:4px;}
.mat-card-name{font-size:15px;font-weight:600;}
.mat-card-price{display:flex;gap:2px;font-size:12px;color:var(--clay);font-weight:600;flex-shrink:0;margin-left:8px;}
.mat-card-price .muted{color:var(--cream-deep);}
.mat-card-specs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px;}
.mat-spec{font-size:11px;padding:1px 8px;border-radius:4px;background:var(--cream);color:var(--text-secondary);}
.mat-card-pros{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px;}
.mat-pros{font-size:11px;padding:1px 6px;border-radius:3px;background:var(--green-light);color:var(--green);}
.mat-cons{font-size:11px;padding:1px 6px;border-radius:3px;background:var(--red-light);color:var(--red);}
.mat-card-uses{font-size:12px;color:var(--text-secondary);line-height:1.4;}

/* ── Settings ── */
.settings-section{margin:16px 0;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow-sm);overflow:hidden;}
.settings-item{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--cream-dark);cursor:pointer;transition:background .15s;}
.settings-item:last-child{border:none;}
.settings-item:hover{background:var(--cream);}
.settings-item-left{display:flex;flex-direction:column;gap:2px;}
.settings-item-title{font-size:14px;font-weight:500;}
.settings-item-desc{font-size:11px;color:var(--text-muted);}
.settings-item .arrow{color:var(--text-muted);font-size:14px;}

/* ── Toolbar ── */
.toolbar{display:flex;gap:6px;padding:8px 0;}
.toolbar-btn{height:36px;padding:0 14px;border:1.5px solid var(--cream-dark);border-radius:8px;background:var(--card);font-size:12px;font-weight:500;color:var(--text-secondary);cursor:pointer;font-family:var(--font-body);transition:all .15s;white-space:nowrap;}
.toolbar-btn.active{border-color:var(--clay);color:var(--clay);background:var(--clay-glint);}
.toolbar-btn:active{transform:scale(.96);}

/* ── Misc ── */
.section-title{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px;}
.section-title:first-child{margin-top:8px;}
.mt-0{margin-top:0!important}
.mb-0{margin-bottom:0!important}

/* ── Recommend ── */
.rec-space-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:16px;}
.rec-space-btn{padding:12px 6px;border:2px solid var(--cream-dark);border-radius:var(--radius-sm);background:var(--card);cursor:pointer;text-align:center;transition:all .2s;font-family:var(--font-body);}
.rec-space-btn .rs-icon{font-size:24px;display:block;margin-bottom:2px;}
.rec-space-btn .rs-label{font-size:12px;font-weight:500;color:var(--text);}
.rec-space-btn.active{border-color:var(--clay);background:var(--clay-glint);}
.rec-space-btn:active{transform:scale(.96);}
.tag-chips{display:flex;gap:6px;flex-wrap:wrap;}
.tag-chip{padding:6px 14px;border:1.5px solid var(--cream-dark);border-radius:8px;background:var(--card);font-size:12px;font-weight:500;color:var(--text-secondary);cursor:pointer;transition:all .15s;font-family:var(--font-body);user-select:none;}
.tag-chip.active{border-color:var(--clay);color:var(--clay);background:var(--clay-glint);}
.tag-chip:active{transform:scale(.96);}
.rec-plan-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow-sm);padding:16px;margin-bottom:12px;cursor:pointer;transition:all .2s;border-left:4px solid var(--cream-deep);}
.rec-plan-card:active{transform:scale(.98);}
.rec-plan-card.balanced{border-left-color:var(--clay);}
.rec-plan-card.economy{border-left-color:var(--green);}
.rec-plan-card.premium{border-left-color:var(--gold);}
.rec-plan-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;margin-bottom:6px;}
.rec-plan-badge.balanced{background:var(--clay-glint);color:var(--clay);}
.rec-plan-badge.economy{background:var(--green-light);color:var(--green);}
.rec-plan-badge.premium{background:#fcf4e0;color:#b8860b;}
.rec-plan-name{font-size:16px;font-weight:600;margin-bottom:2px;}
.rec-plan-desc{font-size:12px;color:var(--text-secondary);margin-bottom:8px;}
.rec-plan-meta{display:flex;flex-wrap:wrap;gap:4px 12px;font-size:12px;color:var(--text-muted);margin-bottom:8px;}
.rec-plan-features{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
.rec-plan-feat{padding:2px 8px;border-radius:4px;background:var(--cream);font-size:11px;color:var(--text-secondary);}
.rec-plan-total{text-align:right;padding-top:6px;border-top:1px solid var(--cream-dark);}
.rec-plan-total .rpt-label{font-size:11px;color:var(--text-muted);}
.rec-plan-total .rpt-number{font-family:var(--font-display);font-size:24px;color:var(--clay);font-weight:500;}
.plan-images{display:flex;gap:6px;overflow-x:auto;margin:6px 0 4px;padding-bottom:4px;scrollbar-width:none;}
.plan-images::-webkit-scrollbar{display:none}
.plan-images img{width:120px;height:90px;object-fit:cover;border-radius:6px;flex-shrink:0;cursor:pointer;transition:transform .2s;background:var(--cream-dark);}
.plan-images img:hover{transform:scale(1.04)}
.img-tag{flex-shrink:0;padding:4px 10px;border-radius:6px;background:var(--clay-glint);color:var(--clay);font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;text-decoration:none;transition:background .2s;}
.img-tag:hover{background:var(--clay-light);}

/* ── Style Explorer ── */
.style-search{margin:8px 0 12px;}
.style-search input{width:100%;height:44px;padding:0 16px 0 40px;border:2px solid var(--cream-dark);border-radius:var(--radius);background:var(--card);font-size:14px;font-family:var(--font-body);color:var(--text);outline:none;transition:border-color .2s;}
.style-search input:focus{border-color:var(--clay);}
.style-search input::placeholder{color:var(--text-muted);}
.style-search .search-ico{position:absolute;margin:10px 0 0 12px;font-size:20px;pointer-events:none;}
.style-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
@media(min-width:520px){.style-grid{grid-template-columns:1fr 1fr 1fr;}}
.style-card{border-radius:var(--radius);background:var(--card);box-shadow:var(--shadow-sm);overflow:hidden;cursor:pointer;transition:all .2s;border:2px solid transparent;}
.style-card:active{transform:scale(.97);}
.style-card.active{border-color:var(--clay);}
.style-card-top{height:80px;display:flex;align-items:flex-end;padding:10px 12px;}
.style-card-top .sc-icon{font-size:32px;line-height:1;}
.style-card-body{padding:10px 12px 12px;}
.style-card-name{font-size:14px;font-weight:600;margin-bottom:1px;}
.style-card-sub{font-size:11px;color:var(--text-muted);line-height:1.3;}
/* Style detail */
.style-hero{border-radius:var(--radius);overflow:hidden;margin:8px 0 16px;position:relative;}
.style-hero-bg{height:120px;display:flex;align-items:flex-end;padding:12px 16px;}
.style-hero-bg .sh-icon{font-size:44px;}
.style-hero-info{padding:16px;background:var(--card);}
.style-hero-name{font-size:20px;font-weight:700;margin-bottom:2px;}
.style-hero-sub{font-size:13px;color:var(--text-secondary);margin-bottom:6px;}
.style-hero-desc{font-size:13px;color:var(--text-secondary);line-height:1.6;}
.color-swatches{display:flex;gap:6px;margin:6px 0;}
.color-swatch{width:36px;height:36px;border-radius:50%;border:2px solid var(--cream-dark);flex-shrink:0;position:relative;}
.color-swatch .cs-label{position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--text-muted);white-space:nowrap;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0;}
.info-card{background:var(--cream);border-radius:var(--radius-sm);padding:10px 12px;}
.info-card .ic-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;margin-bottom:2px;}
.info-card .ic-value{font-size:13px;font-weight:500;color:var(--text);line-height:1.4;}

@media(min-width:520px){
  .page-scroll{padding:0 20px 30px;}
  .quote-type-grid{grid-template-columns:1fr 1fr 1fr 1fr;}
}
</style>

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.page').forEach(p => { p.classList.remove('active'); p.classList.remove('page-enter'); });
  const pg = document.getElementById('page_' + tab);
  pg.classList.add('active');
  pg.classList.remove('page-enter');
  void pg.offsetWidth; // force reflow
  pg.classList.add('page-enter');
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab-item[data-tab="${tab}"]`).classList.add('active');

  const titles = { dimensions:'尺寸速查', measure:'量尺记录', quote:'报价速算', workflow:'设计流程', materials:'材料五金', recommend:'智能推荐' };

  document.getElementById('headerIcon').textContent = icons[tab] || '📐';
  document.getElementById('headerTitle').textContent = titles[tab] || '';

  const sr = document.getElementById('searchRow');
  sr.classList.toggle('show', tab === 'dimensions');

  document.getElementById('fabMeasure').style.display = tab === 'measure' ? 'flex' : 'none';

  renderCurrent();
}

}

function toast(msg) {

  el.textContent = msg; el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2000);
}

function getDimPercent(d) {
  const n = d.match(/\d+/g); if(!n) return 50;
  const v = n.map(Number), avg = v.reduce((a,b)=>a+b,0)/v.length;
  return Math.min(100, Math.max(30, avg/1000*100));
}
function fmtNum(n) { return n.toLocaleString('zh-CN'); }

function renderDim() {
  const el = document.getElementById('dimContent');

  let html = '<div class="sub-tabs">';
  CATS.forEach(c => {
    const cnt = c.id === 'fav' ? favs.size : DIM_DATA.filter(d => d.cat === c.id).length;
    html += `<button class="sub-tab${dimSubTab===c.id?' active':''}" onclick="dimSubTab='${c.id}';renderDim()">${c.icon} ${c.label} ${c.id!=='fav'?cnt:`(${cnt})`}</button>`;
  });
  html += '</div>';

  let items = dimSubTab === 'fav'
    ? DIM_DATA.filter(d => favs.has(d.id))
    : DIM_DATA.filter(d => d.cat === dimSubTab);
  if (searchTerm) {
    const q = searchTerm.toLowerCase();
    items = items.filter(d => d.name.includes(q) || d.note.includes(q) || d.dim.includes(q));
  }
  document.getElementById('countDisplay') && (document.getElementById('countDisplay').textContent = items.length + ' 条');

  if (!items.length) {
    html += `<div class="empty-state"><span class="emoji">${searchTerm?'🔍':'⭐'}</span><h3>${searchTerm?'没有匹配尺寸':dimSubTab==='fav'?'还没有收藏' : '暂无数据'}</h3><p>${searchTerm?'试试其他关键词':dimSubTab==='fav'?'点击卡片上的 ☆ 收藏':'选择上方分类查看尺寸'}</p></div>`;
    el.innerHTML = html; return;
  }

  html += '<div class="cards-grid">';
  items.forEach((item, i) => {
    const isFav = favs.has(item.id);
    const cat = CATS.find(c => c.id === item.cat);
    html += `<div class="card" style="animation-delay:${Math.min(i,20)*30}ms" onclick="showDimDetail('${item.id}')">
      <div class="card-inner">
        <div class="card-ruler${isFav?' fav':''}"></div>
        <div class="card-body">
          <div class="card-name">${item.name}</div>
          <div class="card-dim">${item.dim}<span class="unit">mm</span></div>
          ${item.note ? `<div class="card-note">${item.note}</div>` : ''}
          <div class="dim-bar"><div class="dim-bar-fill" style="width:${getDimPercent(item.dim)}%"></div></div>
        </div>
        <button class="card-star${isFav?' active':''}" onclick="event.stopPropagation();toggleFav('${item.id}')">${isFav?'★':'☆'}</button>
      </div>
    </div>`;
  });
  html += '</div>';
  el.innerHTML = html;
}

      </div>
      <div class="rec-card-rooms">${rooms.map(r => `<span class="rec-room-tag">${r.name||'房间'}</span>`).join('')}</div>
      <div style="font-size:12px;color:var(--text-muted)">${rooms.length} 个房间 · 共 ${rooms.reduce((s,r)=>s+Math.round((r.length||0)*(r.width||0)/1e6*10)/10,0).toFixed(1)} m²${m.customerId?` · 👤 ${getCustomerName(m.customerId)}`:''}</div>
    </div>`;
  });
  el.innerHTML = html;
}

function delMeasure(i) {
  if (!confirm('删除这条量尺记录？')) return;
  measurements.splice(i, 1); saveMeasure(); renderMeasure();
}

function viewMeasure(i) {
  const m = measurements[i]; if (!m) return;
  const rooms = m.rooms || [];
  let html = `<div class="modal-cat">📏 量尺记录</div><div class="modal-title">${m.project||'未命名项目'}</div>
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px">${m.date||''} · ${rooms.length}个房间</div>`;
  rooms.forEach((r, ri) => {
    const area = ((r.length||0)*(r.width||0)/1e6).toFixed(1);
    html += `<div class="modal-section"><h4>${r.name||'房间'+(ri+1)} · ${area}m²</h4>
      <p>长 ${r.length||'-'} × 宽 ${r.width||'-'} × 高 ${r.height||'-'} mm</p>`;
    // Recommendations
    const recs = calcRecs(r);
    if (recs.length) {
      html += `<div class="rec-results" style="margin:8px 0 0"><h4>✅ 推荐方案</h4>`;
      recs.forEach(rec => { html += `<div class="rec-item"><span class="dot">•</span>${rec}</div>`; });
      html += `</div>`;
    }
    html += `</div>`;
  });
  if (m.notes) html += `<div class="modal-section"><h4>📝 备注</h4><p>${m.notes}</p></div>`;
  showModal(html);
}

function calcRecs(room) {
  const w = room.width||0, l = room.length||0, h = room.height||0;
  const recs = [];
  // wardrobe
  if (w >= 1200) {
    const maxW = Math.floor(w / 100) * 100 - 100;
    const maxH = Math.min(Math.floor(h / 100) * 100 - 100, 2800);
    recs.push(`衣柜：可做 ${maxW}mm 宽 × ${maxH}mm 高（建议 ${maxH>2400?'分上下柜':''}）`);
  } else if (w > 0) recs.push(`衣柜：宽度仅 ${w}mm，建议做开方式衣架或放弃`);
  // bed
  if (w >= 2200 && l >= 2200) recs.push(`床：可放 1.8m 床（两侧床头柜略紧）`);
  else if (w >= 2000 && l >= 2200) recs.push(`床：可放 1.5m 床+单侧床头柜`);
  else if (w >= 1800) recs.push(`床：最多放 1.35m 床`);
  else recs.push(`床：空间有限，建议做定制榻榻米`);
  // desk
  if (w >= 1200 && l >= 600) recs.push(`书桌：可做 ${Math.min(Math.floor(w/100)*100-200,1600)}mm 宽书桌`);
  // notes
  if (h < 2400) recs.push(`注意：层高仅 ${h}mm，吊柜需定制`);
  return recs;
}

function showMeasureForm(editIdx) {

function today() { const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

function addRoom() {

function removeRoom(ri) {

function saveMeasureForm(isEdit, editIdx) {
  const rooms = [];
  document.querySelectorAll('.room-entry').forEach(el => {

function calcQuote() {
  const p = PRICE_DATA[qType];
  if (!p) return toast('请先选择柜体类型');
  qW = parseFloat(document.getElementById('qW').value) || 0;
  qH = parseFloat(document.getElementById('qH').value) || 0;
  qD = parseFloat(document.getElementById('qD').value) || 0;
  if (!qW || !qH) return toast('请输入尺寸');

  const unitPrice = qGrade==='econ' ? p.econ : qGrade==='std' ? p.std : p.prem;
  let area, areaStr, unit;
  if (p.unit === '延米') {
    area = qW / 1000;
    unit = '延米';
  } else if (p.unit === '套') {
    area = 1; unit = '套';
  } else {
    area = (qW * qH) / 1e6;
    unit = 'm²';
  }

  // Calculate breakdown
  const baseTotal = area * unitPrice;
  let optsTotal = 0, optsDesc = [];
  const optDefs = getOpts(qType);
  optDefs.forEach(o => {
    if (qOpts[o.id]) { optsTotal += o.price; optsDesc.push(o.label); }
  });
  const total = baseTotal + optsTotal;

  const breakdown = [
    { label:'板材', pct: qGrade==='econ'?45:qGrade==='std'?50:55 },
    { label:'五金', pct: qGrade==='econ'?10:qGrade==='std'?12:15 },
    { label:'台面', pct: qType==='kitchen'?25: qType==='bathroom'?20:0 },
    { label:'安装', pct: 18 },
    { label:'运费', pct: 5 },
  ];

  const totalPct = breakdown.reduce((s,i)=>s+i.pct,0);
  const items = breakdown.filter(i => i.pct > 0).map(i => ({
    label: i.label,
    val: Math.round(total * i.pct / totalPct),
    pct: i.pct
  }));

  qResult = {
    type: qType,
    typeLabel: CAT_LABELS[qType],
    gradeLabel: GRADE_LABELS[GRADE_KEYS.indexOf(qGrade)],
    w: qW, h: qH, d: qD,
    area: area.toFixed(2),
    unit,
    unitPrice,
    items,
    total: Math.round(total),
    optsDesc: optsDesc.join('、'),
    date: today(),
    customerId: document.getElementById('q_customer').value || ''
  };

  quotes.push(qResult);
  saveQuotes();
  renderQuote();
}

function getWF() {
  const key = '_default';
  if (!wfProjects[key]) {
    wfProjects[key] = { project:'', started:today(), steps: WF_STEPS.map(s => ({
      id: s.id,
      done: false,
      checks: s.checks.map(() => false),
      mistakesOpen: false,
      tipsOpen: false
    }))};
  }
  return wfProjects[key];
}

function renderWF() {
  const el = document.getElementById('workflowContent');
  const wf = getWF();
  const totalChecks = wf.steps.reduce((s,st) => s + st.checks.length, 0);
  const doneChecks = wf.steps.reduce((s,st) => s + st.checks.filter(c=>c).length, 0);
  const pct = totalChecks ? Math.round(doneChecks/totalChecks*100) : 0;
  const doneSteps = wf.steps.filter(s => s.done).length;

  let html = `<div class="workflow-progress">
    <div class="wf-progress-bar"><div class="wf-progress-fill" style="width:${pct}%"></div></div>
    <div class="wf-progress-text">已完成 ${doneSteps}/${wf.steps.length} 步 · ${doneChecks}/${totalChecks} 项</div>
  </div>`;

  // Step dots
  html += `<div class="wf-steps"><div class="wf-steps-line"><div class="wf-steps-line-fill" style="width:${doneSteps/wf.steps.length*100}%"></div></div>`;
  WF_STEPS.forEach((s, i) => {
    const cls = wf.steps[i].done ? 'done' : (i === wfStep ? 'current' : '');
    html += `<div class="wf-step ${cls}" onclick="wfStep=${i};renderWF()">
      <div class="wf-step-dot">${wf.steps[i].done?'✓':s.icon}</div>
      <div class="wf-step-label">${s.label}</div>
    </div>`;
  });
  html += `</div>`;

  // Current step content
  const step = WF_STEPS[wfStep];
  const st = wf.steps[wfStep];
  html += `<div class="wf-step-content">
    <div class="wf-step-title">${step.icon} ${step.label} · ${st.done?'✅ 已完成':'进行中'}</div>`;

  // Checklist
  step.checks.forEach((chk, ci) => {
    const done = st.checks[ci];
    html += `<div class="checklist-item${done?' done':''}" onclick="toggleCheck(${wfStep},${ci})">
      <div class="ck-box">${done?'✓':''}</div>
      <div class="ck-text">${chk}</div>
    </div>`;
  });

  // Mistakes
  html += `<div class="collapse-toggle${st.mistakesOpen?' open':''}" onclick="toggleMFold(${wfStep},'mistakes')">
    <span>⚠️ 新手常犯错误</span><span class="arrow">▼</span>
  </div>
  <div class="collapse-body${st.mistakesOpen?' open':''}"><ul>${step.mistakes.map(m=>`<li>${m}</li>`).join('')}</ul></div>`;

  // Tips
  html += `<div class="collapse-toggle${st.tipsOpen?' open':''}" onclick="toggleMFold(${wfStep},'tips')">
    <span>💡 客户沟通技巧</span><span class="arrow">▼</span>
  </div>
  <div class="collapse-body${st.tipsOpen?' open':''}"><ul>${step.tips.map(t=>`<li>${t}</li>`).join('')}</ul></div>`;

  // Footer button
  html += `<div class="wf-step-footer">`;
  if (st.done) {
    html += `<button class="btn btn-secondary btn-block" onclick="undoStep(${wfStep})">↩ 撤销完成</button>`;
  } else {
    const allChecked = st.checks.every(c => c);
    html += `<button class="btn btn-primary btn-block${allChecked?'':' btn-secondary'}" onclick="completeStep(${wfStep})" ${allChecked?'':'disabled'}>${allChecked?'✅ 标记此步骤完成':'请先完成所有 checklist 项目'}</button>`;
  }
  html += `</div></div>`;

  el.innerHTML = html;
}

function toggleCheck(si, ci) {
  const wf = getWF();
  wf.steps[si].checks[ci] = !wf.steps[si].checks[ci];
  saveWF(); renderWF();
}
function toggleMFold(si, key) {
  const wf = getWF();
  wf.steps[si][key+'Open'] = !wf.steps[si][key+'Open'];
  saveWF(); renderWF();
}
function completeStep(si) {
  const wf = getWF();
  wf.steps[si].done = true;
  saveWF();
  if (si < WF_STEPS.length - 1) wfStep = si + 1;
  renderWF();
}
function undoStep(si) {
  const wf = getWF();
  wf.steps[si].done = false;
  saveWF(); renderWF();
}

// ─── SVG layout diagram generator ──
function genLayoutSVG(layout, w, l, colors, compact, spaceId) {
  const W = 300, H = 200;
  const p = compact ? 18 : 25;
  const rw = W-p*2, rh = H-p-15;
  const sc = Math.min(rw/w, rh/l, compact ? 120 : 80);
  const ox = p + (rw-w*sc)/2, oy = p + 15 + (rh-l*sc)/2;
  const c1 = '#c47040', c2 = colors?colors[1]:'#e8c4a8';
  const fs = compact ? 6 : 10;
  const sw = compact ? 0.5 : 1.5;
  const cd = compact ? 18 : 28;
  const layoutType = layout.includes('L型') ? 'L' : layout.includes('U型') ? 'U' : layout.includes('中岛') ? 'island' : layout.includes('一字') ? 'line' : layout.includes('双一字') ? 'double' : 'line';
  const LB = { kitchen:{m:'地柜',u:'吊柜'}, bedroom:{m:'衣柜',u:'顶柜'}, living:{m:'电视柜',u:'储物柜'}, entry:{m:'鞋柜',u:'吊柜'}, study:{m:'书桌',u:'书架'}, closet:{m:'衣柜',u:'顶柜'} }[spaceId]||{m:'柜体',u:'吊柜'};

  if (compact) {
    let s = `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:100%">`;
    s += `<rect x="${ox}" y="${oy}" width="${w*sc}" height="${l*sc}" fill="#f5f0eb" stroke="#2d1810" stroke-width="${sw}" rx="2"/>`;
    s += `<text x="${ox+w*sc/2}" y="${oy-4}" text-anchor="middle" font-size="${fs}" fill="#8b7355">${w}m</text>`;
    s += `<text x="${ox-4}" y="${oy+l*sc/2+2}" text-anchor="end" font-size="${fs}" fill="#8b7355">${l}m</text>`;
    if (layoutType === 'L') {
      s += `<rect x="${ox}" y="${oy+l*sc-cd}" width="${w*sc}" height="${cd}" fill="${c1}" opacity=".3" stroke="${c1}" stroke-width="${sw}" rx="1"/>`;
      s += `<rect x="${ox+w*sc-cd}" y="${oy}" width="${cd}" height="${l*sc}" fill="${c1}" opacity=".3" stroke="${c1}" stroke-width="${sw}" rx="1"/>`;
    } else if (layoutType === 'U') {
      s += `<rect x="${ox}" y="${oy+l*sc-cd}" width="${w*sc}" height="${cd}" fill="${c1}" opacity=".3" stroke="${c1}" stroke-width="${sw}" rx="1"/>`;
      s += `<rect x="${ox}" y="${oy}" width="${cd}" height="${l*sc}" fill="${c1}" opacity=".3" stroke="${c1}" stroke-width="${sw}" rx="1"/>`;
      s += `<rect x="${ox+w*sc-cd}" y="${oy}" width="${cd}" height="${l*sc-cd/2}" fill="${c1}" opacity=".3" stroke="${c1}" stroke-width="${sw}" rx="1"/>`;
    } else if (layoutType === 'island') {
      s += `<rect x="${ox}" y="${oy+12}" width="${w*sc}" height="${cd}" fill="${c1}" opacity=".25" stroke="${c1}" stroke-width="${sw}" rx="1"/>`;
      s += `<rect x="${ox}" y="${oy+l*sc-cd-12}" width="${w*sc}" height="${cd}" fill="${c1}" opacity=".25" stroke="${c1}" stroke-width="${sw}" rx="1"/>`;
      s += `<rect x="${ox+w*sc/2-20}" y="${oy+l*sc/2-10}" width="40" height="20" fill="${c2}" stroke="${c1}" stroke-width="${sw}" rx="2"/>`;
    } else if (layoutType === 'double') {
      s += `<rect x="${ox}" y="${oy+10}" width="${w*sc}" height="${cd}" fill="${c1}" opacity=".25" stroke="${c1}" stroke-width="${sw}" rx="1"/>`;
      s += `<rect x="${ox}" y="${oy+l*sc-cd-10}" width="${w*sc}" height="${cd}" fill="${c1}" opacity=".25" stroke="${c1}" stroke-width="${sw}" rx="1"/>`;
    } else {
      s += `<rect x="${ox+10}" y="${oy+l*sc-cd}" width="${w*sc-20}" height="${cd}" fill="${c1}" opacity=".3" stroke="${c1}" stroke-width="${sw}" rx="1"/>`;
      s += `<rect x="${ox+10}" y="${oy+10}" width="${w*sc-20}" height="${cd*0.6}" fill="${c1}" opacity=".15" stroke="${c1}" stroke-width="${sw*0.5}" stroke-dasharray="2,2" rx="1"/>`;
    }
    s += '</svg>';
    return s;
  }

  let svg = `<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-height:200px;border-radius:10px;background:#f5f0eb">`;
  svg += `<rect x="${ox}" y="${oy}" width="${w*sc}" height="${l*sc}" fill="#f5f0eb" stroke="#2d1810" stroke-width="1.5" rx="3"/>`;
  svg += `<text x="${ox+w*sc/2}" y="${oy-6}" text-anchor="middle" font-size="10" fill="#8b7355">${w}m</text>`;
  svg += `<text x="${ox-6}" y="${oy+l*sc/2+3}" text-anchor="end" font-size="10" fill="#8b7355">${l}m</text>`;

  // Door marker
  const doorX = ox + w*sc - 24, doorY = oy;
  svg += `<path d="M${doorX},${doorY} L${doorX+6},${doorY+6} L${doorX+6},${doorY+24} L${doorX-6},${doorY+24} L${doorX-6},${doorY+6} Z" fill="#e0d0c2" stroke="#8b7355" stroke-width="0.5"/>`;
  svg += `<text x="${doorX}" y="${doorY+17}" text-anchor="middle" font-size="6" fill="#8b7355">🚪</text>`;

  if (layoutType === 'L') {
    svg += `<rect x="${ox}" y="${oy+l*sc-cd}" width="${w*sc}" height="${cd}" fill="${c1}" opacity=".3" stroke="${c1}" stroke-width="1" rx="2"/>`;
    svg += `<rect x="${ox+w*sc-cd}" y="${oy}" width="${cd}" height="${l*sc}" fill="${c1}" opacity=".3" stroke="${c1}" stroke-width="1" rx="2"/>`;
    svg += `<text x="${ox+w*sc/2}" y="${oy+l*sc-cd/2+4}" text-anchor="middle" font-size="9" fill="#2d1810">${LB.m}</text>`;
    svg += `<text x="${ox+w*sc-cd/2}" y="${oy+l*sc/2+3}" text-anchor="middle" font-size="9" fill="#2d1810">${LB.u}</text>`;
  } else if (layoutType === 'U') {
    svg += `<rect x="${ox}" y="${oy+l*sc-cd}" width="${w*sc}" height="${cd}" fill="${c1}" opacity=".3" stroke="${c1}" stroke-width="1" rx="2"/>`;
    svg += `<rect x="${ox}" y="${oy}" width="${cd}" height="${l*sc}" fill="${c1}" opacity=".3" stroke="${c1}" stroke-width="1" rx="2"/>`;
    svg += `<rect x="${ox+w*sc-cd}" y="${oy}" width="${cd}" height="${l*sc-cd/2}" fill="${c1}" opacity=".3" stroke="${c1}" stroke-width="1" rx="2"/>`;
  } else if (layoutType === 'island') {
    svg += `<rect x="${ox}" y="${oy+20}" width="${w*sc}" height="${cd}" fill="${c1}" opacity=".25" stroke="${c1}" stroke-width="1" rx="2"/>`;
    svg += `<rect x="${ox}" y="${oy+l*sc-cd-20}" width="${w*sc}" height="${cd}" fill="${c1}" opacity=".25" stroke="${c1}" stroke-width="1" rx="2"/>`;
    svg += `<rect x="${ox+w*sc/2-30}" y="${oy+l*sc/2-15}" width="60" height="30" fill="${c2}" stroke="${c1}" stroke-width="1" rx="3"/>`;
    svg += `<text x="${ox+w*sc/2}" y="${oy+l*sc/2+3}" text-anchor="middle" font-size="9" fill="#2d1810">中岛</text>`;
  } else if (layoutType === 'double') {
    svg += `<rect x="${ox}" y="${oy+15}" width="${w*sc}" height="${cd}" fill="${c1}" opacity=".25" stroke="${c1}" stroke-width="1" rx="2"/>`;
    svg += `<rect x="${ox}" y="${oy+l*sc-cd-15}" width="${w*sc}" height="${cd}" fill="${c1}" opacity=".25" stroke="${c1}" stroke-width="1" rx="2"/>`;
  } else {
    svg += `<rect x="${ox+15}" y="${oy+l*sc-cd}" width="${w*sc-30}" height="${cd}" fill="${c1}" opacity=".3" stroke="${c1}" stroke-width="1" rx="2"/>`;
    svg += `<text x="${ox+w*sc/2}" y="${oy+l*sc-cd/2+4}" text-anchor="middle" font-size="9" fill="#2d1810">${LB.m}</text>`;
    svg += `<rect x="${ox+15}" y="${oy+15}" width="${w*sc-30}" height="${cd*0.6}" fill="${c1}" opacity=".15" stroke="${c1}" stroke-width="0.5" stroke-dasharray="3,2" rx="2"/>`;
    svg += `<text x="${ox+w*sc/2}" y="${oy+15+cd*0.6/2+3}" text-anchor="middle" font-size="7" fill="#8b7355">${LB.u}</text>`;
  }

  svg += `<rect x="${ox}" y="${oy+l*sc+8}" width="8" height="8" fill="${c1}" opacity=".3" stroke="${c1}" stroke-width="0.5" rx="1"/>`;
  svg += `<text x="${ox+12}" y="${oy+l*sc+16}" font-size="8" fill="#6b5a4e">柜体  ·  比例示意，非精确图纸</text>`;
  svg += '</svg>';
  return svg;
}

function genColorBar(colors, names) {
  if (!colors || !colors.length) return '';
  const seg = Math.max(1, Math.floor(100 / colors.length));
  let bar = '<div style="display:flex;border-radius:8px;overflow:hidden;height:32px;margin:6px 0">';
  colors.forEach((c, i) => {
    bar += `<div style="flex:${seg};background:${c};display:flex;align-items:center;justify-content:center;font-size:9px;color:${i<3?'#2d1810':'#fff'}">${names&&names[i]?names[i]:''}</div>`;
  });
  bar += '</div>';
  return bar;
}

function exportData() {
  const data = {
    favs: [...favs],
    measurements,
    quotes,
    wf: wfProjects,
    brand: brandSettings,
    customers,
    exportedAt: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = '全屋定制助手数据_'+today()+'.json';
  a.click(); URL.revokeObjectURL(url);
  toast('数据已导出 ✅');
  hideModal();
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      if (data.favs) favs = new Set(data.favs);
      if (data.measurements) measurements = data.measurements;
      if (data.quotes) quotes = data.quotes;
      if (data.wf) wfProjects = data.wf;
      if (data.brand) brandSettings = data.brand;
      if (data.customers) customers = data.customers;
      saveFavs(); saveMeasure(); saveQuotes(); saveWF(); saveBrand(); saveCustomers();
      render(); toast('数据导入成功 ✅');
      hideModal();
    } catch(e) { toast('导入失败：文件格式错误'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

    ? `<span>👤 ${c.name}${c.phone?' · '+c.phone:''}</span>${c.address?`<span style="font-size:12px;color:var(--text-muted)">${c.address}</span>`:''}`
    : '';
  document.getElementById('qc_title').textContent = `${q.typeLabel} · ${q.gradeLabel}`;
  document.getElementById('qc_dims').textContent = `${q.w}×${q.h}×${q.d} mm · ${q.area} ${q.unit} · ¥${q.unitPrice}/${q.unit}`;

  const itemsHtml = (q.items||[]).map(item => {
    const pct = item.pct;
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f5f0eb">
      <span style="font-size:13px">${item.label}</span>
      <div style="flex:1;margin:0 12px;height:6px;background:#f0e6de;border-radius:3px">
        <div style="height:100%;width:${pct}%;background:#c47040;border-radius:3px"></div>
      </div>
      <span style="font-size:14px;font-weight:600">¥${fmtNum(item.val)}</span>
    </div>`;
  }).join('');
  document.getElementById('qc_items').innerHTML = itemsHtml;

  document.getElementById('qc_total').textContent = `¥${fmtNum(q.total)}`;
  document.getElementById('qc_opts').textContent = q.optsDesc ? `配件：${q.optsDesc}` : '';
  document.getElementById('qc_footer').textContent = `由 全屋定制助手 生成 · ${today()}`;

  // Inject card if not present
  if (!document.getElementById('quoteCardExport')) {
    const div = document.createElement('div');
    div.innerHTML = QUOTE_CARD_HTML;
    document.body.appendChild(div.firstElementChild);
  }

  // Wait for DOM then render
  setTimeout(() => {
    const el = document.getElementById('quoteCardExport');
    if (typeof html2canvas !== 'undefined') {
      renderWithHtml2canvas(el, i);
    } else {
      // Lazy load from CDN
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
      s.onload = () => renderWithHtml2canvas(el, i);
      s.onerror = () => renderFallbackCanvas(q, b, c);
      document.head.appendChild(s);
    }
  }, 100);
}

function renderWithHtml2canvas(el, i) {
  const q = quotes[i];
  html2canvas(el, { scale: 2, useCORS: true, backgroundColor: '#fff', width: 480 })
    .then(canvas => {
      canvas.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        // Try Web Share API
        if (navigator.share && navigator.canShare({ files: [new File([blob], '报价单.png', { type: 'image/png' })] })) {
          navigator.share({ files: [new File([blob], '报价单.png', { type: 'image/png' })], title: '报价单' }).catch(() => {});
        } else {
          // Fallback: open in new tab (user can save/screenshot)
          const w = window.open('');
          w.document.write(`<img src="${url}" style="max-width:100%" onload="setTimeout(function(){window.location.href='${url}'},300)"><p style="font-family:sans-serif;text-align:center;color:#999;margin-top:20px">长按图片保存到相册 · 或分享给客户</p>`);
        }
        URL.revokeObjectURL(url);
      }, 'image/png');
    })
    .catch(() => renderFallbackCanvas(q, null, null));
}

function renderFallbackCanvas(q, b, c) {
  // Pure Canvas fallback when html2canvas fails
  const W = 480, H = 700, RATIO = 2;
  const canvas = document.createElement('canvas');
  canvas.width = W * RATIO; canvas.height = H * RATIO;
  const ctx = canvas.getContext('2d');
  ctx.scale(RATIO, RATIO);

  // Background
  ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, W, H);
  // Header bar
  ctx.fillStyle = '#2d1810'; ctx.fillRect(0, 0, W, 70);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 20px sans-serif'; ctx.fillText(b&&b.companyName?b.companyName:'全屋定制报价单', 24, 38);
  ctx.font = '12px sans-serif'; ctx.fillStyle = 'rgba(255,255,255,0.7)';
  const contact = [b&&b.phone, b&&b.wechat].filter(Boolean).join(' · ');
  if (contact) ctx.fillText(contact, 24, 58);

  // Customer info
  const cust = c;
  if (cust) {
    ctx.fillStyle = '#faf5f0'; ctx.fillRect(0, 70, W, 36);
    ctx.fillStyle = '#2d1810'; ctx.font = '13px sans-serif';
    ctx.fillText('\u{1F464} '+cust.name+(cust.phone?' · '+cust.phone:''), 24, 93);
  }

  // Content
  let y = cust ? 130 : 110;
  ctx.fillStyle = '#999'; ctx.font = '13px sans-serif';
  ctx.fillText('报价详情', 24, y); y += 24;
  ctx.fillStyle = '#2d1810'; ctx.font = 'bold 15px sans-serif';
  ctx.fillText(q.typeLabel+' · '+q.gradeLabel, 24, y); y += 20;
  ctx.fillStyle = '#666'; ctx.font = '13px sans-serif';
  ctx.fillText(q.w+'×'+q.h+'×'+q.d+' mm · '+q.area+' '+q.unit+' · ¥'+q.unitPrice+'/'+q.unit, 24, y); y += 16;

  // Items
  (q.items||[]).forEach(item => {
    y += 8;
    ctx.fillStyle = '#2d1810'; ctx.font = '13px sans-serif';
    ctx.fillText(item.label, 24, y);
    ctx.fillStyle = '#2d1810'; ctx.font = 'bold 14px sans-serif';
    const priceText = '¥'+fmtNum(item.val);
    ctx.textAlign = 'right'; ctx.fillText(priceText, W-24, y);
    ctx.textAlign = 'left';
    // Bar background
    ctx.fillStyle = '#f0e6de'; ctx.fillRect(90, y-4, 200, 6);
    // Bar fill
    ctx.fillStyle = '#c47040'; ctx.fillRect(90, y-4, 200*item.pct/100, 6);
    y += 6;
  });

  // Total
  y += 16;
  ctx.strokeStyle = '#c47040'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(24, y); ctx.lineTo(W-24, y); ctx.stroke(); y += 12;
  ctx.fillStyle = '#999'; ctx.font = '12px sans-serif';
  ctx.fillText('合计', 24, y); y += 24;
  ctx.fillStyle = '#c47040'; ctx.font = 'bold 28px sans-serif';
  ctx.fillText('¥'+fmtNum(q.total), 24, y);

  // Footer
  ctx.fillStyle = '#ddd'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('由 全屋定制助手 生成 · '+today(), W/2, H-20);

  // Output
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const w = window.open('');
    w.document.write(`<img src="${url}" style="max-width:100%"><p style="font-family:sans-serif;text-align:center;color:#999;margin-top:20px">长按图片保存到相册 · 或截图分享给客户</p>`);
    URL.revokeObjectURL(url);
  }, 'image/png');
}
