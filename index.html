<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>全屋定制助手</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#2d1810">
<meta name="apple-mobile-web-app-title" content="定制助手">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400;1,6..72,500&family=DM+Sans:opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>
<body>

<!-- Header -->
<header class="header" id="appHeader">
  <div class="header-left">
    <span class="header-icon" id="headerIcon">📐</span>
    <span class="header-title" id="headerTitle">尺寸速查</span>
  </div>
  <div class="header-right">
    <button class="header-btn" onclick="showSettings()" title="设置">⚙️</button>
  </div>
</header>

<!-- Search (dimensions page only) -->
<div class="search-row" id="searchRow">
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="搜索尺寸..." autocomplete="off">
    <span class="search-icon">⌕</span>
  </div>
</div>

<!-- Pages -->
<div class="page active" id="page_dimensions">
  <div class="page-scroll" id="dimContent"></div>
</div>

<div class="page" id="page_measure">
  <div class="page-scroll" id="measureContent"></div>
  <button class="fab" id="fabMeasure" onclick="showMeasureForm()">+</button>
</div>

<div class="page" id="page_quote">
  <div class="page-scroll" id="quoteContent"></div>
</div>

<div class="page" id="page_workflow">
  <div class="page-scroll" id="workflowContent"></div>
</div>

<div class="page" id="page_materials">
  <div class="page-scroll" id="matContent"></div>
</div>

<div class="page" id="page_recommend">
  <div class="page-scroll" id="recommendContent"></div>
</div>

<!-- Tab Bar -->
<nav class="tab-bar" id="tabBar">
  <button class="tab-item active" data-tab="dimensions"><span class="tab-icon">📐</span>尺寸</button>
  <button class="tab-item" data-tab="measure"><span class="tab-icon">📏</span>量尺</button>
  <button class="tab-item" data-tab="quote"><span class="tab-icon">💰</span>报价</button>
  <button class="tab-item" data-tab="workflow"><span class="tab-icon">📋</span>流程</button>
  <button class="tab-item" data-tab="materials"><span class="tab-icon">🔩</span>材料</button>
  <button class="tab-item" data-tab="recommend"><span class="tab-icon">💡</span>推荐</button>
</nav>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-sheet" id="modalSheet">
    <div class="modal-handle"></div>
    <div id="modalContent"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="app.js"></script>

</body>
</html>
